version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: cbs_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cbs_projesi
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: cbs_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://user:password@db/cbs_projesi

volumes:
  postgres_data: